name: Scaled Link Checker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Runs every night at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get Changed Blog Files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: src/content/blog/**/*.md

      - name: Identify Target Files
        id: select-files
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "pull_request" ]; then
            # Check ONLY changed files on commits
            FILES="${{ steps.changed-files.outputs.all_changed_files }}"
            echo "files=$FILES" >> $GITHUB_OUTPUT
          else
            # Run 28-day hash rotation on schedule
            FILES=$(node -e "
              const fs = require('fs');
              const path = require('path');
              const blogDir = './src/content/blog';
              if (!fs.existsSync(blogDir)) { console.log(''); process.exit(0); }
              
              function getHashBucket(str, buckets) {
                let hash = 0;
                for (let i = 0; i < str.length; i++) { hash = str.charCodeAt(i) + ((hash << 5) - hash); }
                return Math.abs(hash) % buckets;
              }
              
              const files = fs.readdirSync(blogDir).filter(f => f.endsWith('.md'));
              const totalBuckets = 28;
              const todayBucket = (new Date().getUTCDate() - 1) % totalBuckets;
              const matchingFiles = [];
              
              files.forEach(file => {
                if (getHashBucket(file, totalBuckets) === todayBucket) {
                  matchingFiles.push(path.join(blogDir, file));
                }
              });
              console.log(matchingFiles.join(' '));
            ")
            echo "files=$FILES" >> $GITHUB_OUTPUT
          fi

      - name: Test Selected Links
        if: steps.select-files.outputs.files != ''
        uses: lycheeverse/lychee-action@v1.9.0
        with:
          args: --verbose --no-progress ${{ steps.select-files.outputs.files }}
          # Fail the build if a new commit has a broken link. Don't fail on scheduled checks.
          fail: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}